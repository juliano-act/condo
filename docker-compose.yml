services:
  postgres:
    image: postgres:16-alpine
    container_name: condoconnect-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: condoconnect
      POSTGRES_USER: condoconnect
      POSTGRES_PASSWORD: condoconnect
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U condoconnect -d condoconnect"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
